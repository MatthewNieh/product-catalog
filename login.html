<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nistech Catalogue Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body class="login-body">
  <main class="login-shell">
    <section class="login-card">
      <p class="eyebrow">Nistech Internal Access</p>
      <h1>Product catalogue login</h1>
      <p class="login-copy">Enter the access password to open the static product catalogue.</p>

      <form id="login-form" class="login-form">
        <label class="filter-field">
          <span>Password</span>
          <input id="password-input" type="password" placeholder="Enter password" autocomplete="current-password" required>
        </label>
        <p id="login-error" class="login-error hidden">Incorrect password.</p>
        <button class="primary-button login-button" type="submit">Enter Catalogue</button>
      </form>
    </section>
  </main>

  <script src="auth.js"></script>
</body>
</html>
